<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Do Sofá à Maratona | Guia para Iniciantes</title>
  <style>
    :root { 
      --red: #c0392b; 
      --red-dark: #8f241b; 
      --wine: #651919; 
      --black: #0b0a0a; 
      --cream: #faf4f2; 
      --white: #ffffff; 
    }
    
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Open Sans", sans-serif; background: var(--white); line-height: 1.6; color: #333; }
    
    nav { 
      height: 70px; 
      background: #080707; 
      border-bottom: 2px solid var(--red); 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0 7%; 
      color: var(--white); 
      position: sticky; 
      top: 0; 
      z-index: 10; 
    }
    
    .hero { 
      min-height: 550px; 
      display: flex; 
      align-items: center; 
      padding: 60px 7%; 
      color: var(--white); 
      /* Ajustado: 'center top' para não cortar sua cabeça na foto do topo */
      background: linear-gradient(90deg, rgba(0,0,0,0.85), rgba(0,0,0,0.3)), url('Corrida 2.jpg') center top/cover; 
    }
    
    .hero h1 { font-size: clamp(32px, 8vw, 60px); text-transform: uppercase; margin: 0; line-height: 1.1; font-weight: 800; }
    .hero h1 span { color: var(--red); }
    
    .btn { 
      display: inline-block; 
      padding: 18px 30px; 
      background: var(--red); 
      color: white; 
      text-decoration: none; 
      font-weight: bold; 
      text-transform: uppercase; 
      border-radius: 4px; 
      margin-top: 25px;
      transition: 0.3s;
    }
    .btn:hover { background: var(--red-dark); transform: scale(1.02); }

    .wrap { max-width: 1100px; margin: auto; padding: 80px 20px; }
    
    .story { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; }
    
    /* Ajustado: height auto para a foto do autor aparecer inteira */
    .story img { 
      width: 100%; 
      height: auto; 
      border: 4px solid var(--red); 
      box-shadow: 12px 12px 0 var(--wine); 
      display: block;
    }
    
    .story h2 { font-size: 32px; text-transform: uppercase; margin-bottom: 20px; line-height: 1.2; }
    .story h2 span { color: var(--red); }

    .photos { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 5px; 
      background: #000; 
      padding: 5px; 
    }

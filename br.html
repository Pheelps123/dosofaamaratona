    * { box-sizing: border-box; }

    .hero {

    }
    
    .hero h1 { font-size: 50px; text-transform: uppercase; margin: 0; font-weight: 900; }

    .story { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }

    .photos { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; background: #000; padding: 5px; }
    .photos img { width: 100%; height: 400px; object-fit: cover; object-position: top; }

    .buy { text-align: center; padding: 100px 20px; background: #080808; }
    .pricebox { border: 2px solid #c0392b; padding: 50px 20px; max-width: 450px; margin: auto; }
    .price { font-size: 60px; font-weight: 900; color: #c0392b; margin: 10px 0; }

    @media (max-width: 768px) {
      .story { grid-template-columns: 1fr; text-align: center; }
      .photos { grid-template-columns: 1fr 1fr; }
      .photos img { height: 250px; }
      .hero { background-position: center top; text-align: center; justify-content: center; }
    }
  </style>
</head>
